version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      root-types:
        patterns:
          - "@types/*"
          - "typescript"
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      lint-tooling:
        patterns:
          - "eslint*"
          - "prettier"
          - "lint-staged"
          - "husky"
      test-tooling:
        patterns:
          - "vitest*"
          - "@testing-library/*"
