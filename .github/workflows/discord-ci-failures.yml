name: Discord CI Failures

on:
  workflow_run:
    workflows: ["Pipeline"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: discord-ci-failures-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate workflow results
        id: evaluate
        uses: actions/github-script@v7
        with:
          script: |
            const workflowRun = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const shouldNotify = workflowRun.conclusion === "failure";

            core.setOutput("should_notify", shouldNotify ? "true" : "false");
            core.setOutput("failed_workflows", `- ${workflowRun.name}`);
            core.setOutput(
              "summary_url",
              `https://github.com/${owner}/${repo}/actions?query=branch%3A${encodeURIComponent(context.payload.workflow_run.head_branch)}`
            );

      - name: Check webhook configuration
        id: webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord notification
        if: ${{ steps.evaluate.outputs.should_notify == 'true' && steps.webhook.outputs.configured == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event.workflow_run.event }}
          ACTOR: ${{ github.event.workflow_run.actor.login }}
          FAILED_WORKFLOWS: ${{ steps.evaluate.outputs.failed_workflows }}
          SUMMARY_URL: ${{ steps.evaluate.outputs.summary_url }}
        run: |
          payload=$(python3 - <<'PY'
          import json
          import os

          repository = os.environ["REPOSITORY"]
          branch = os.environ["BRANCH"]
          event_name = os.environ["EVENT_NAME"]
          actor = os.environ["ACTOR"]
          failed_workflows = os.environ["FAILED_WORKFLOWS"]
          summary_url = os.environ["SUMMARY_URL"]

          print(json.dumps({
              "embeds": [
                  {
                      "title": "CI Failure",
                      "color": 15158332,
                      "fields": [
                          {"name": "Repository", "value": repository, "inline": True},
                          {"name": "Branch", "value": branch, "inline": True},
                          {"name": "Event", "value": event_name, "inline": True},
                          {"name": "Actor", "value": actor, "inline": True},
                          {"name": "Failed Workflows", "value": failed_workflows or "None", "inline": False},
                          {"name": "Actions", "value": summary_url, "inline": False},
                      ],
                  }
              ]
          }))
          PY
          )

          curl -fsSL -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"
